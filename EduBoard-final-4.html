<style>
:root{
  --red:#E8284A;--redL:#FFF0F2;--redM:#F95C73;
  --yellow:#F5C518;--yellowL:#FFFBEA;--yellowM:#FFE066;
  --green:#18C964;--greenL:#E6FFF2;--greenM:#5DDBA5;
  --blue:#3B82F6;--blueL:#EFF6FF;
  --ink:#18182E;--ink2:#3D3D5C;--muted:#8888AA;

  --shadow:rgba(24,24,46,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#D8DBE6}
#app{height:100%;max-width:500px;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);box-shadow:0 0 40px rgba(0,0,0,.12);overflow:hidden;padding-top:env(safe-area-inset-top,0px)}

/* ── Inputs : jamais de redraw au keystroke ── */
input,textarea,select{font-family:inherit;-webkit-appearance:none;appearance:none;outline:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
button:active{opacity:.75;transform:scale(.96)}
::-webkit-scrollbar{display:none}

.card{background:var(--white);border-radius:18px;border:1.5px solid var(--border);box-shadow:0 2px 14px var(--shadow)}
.inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--ink);font-size:15px;font-family:inherit;display:block;transition:border-color .15s}
.inp:focus{border-color:var(--blue);background:#fff}
.inp.err{border-color:var(--red)!important}
.pill{display:inline-flex;align-items:center;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;white-space:nowrap}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes msgIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.fade{animation:fadeUp .26s ease both}
.popin{animation:pop .2s ease}
.msganim{animation:msgIn .16s ease}

/* Toast */
#toast{position:fixed;bottom:calc(86px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(16px);background:#18182E;color:#fff;padding:10px 20px;border-radius:22px;font-size:13px;font-weight:700;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:9999;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Search */
.searchbar{position:relative}
.searchbar input{padding-left:38px!important}
.searchbar::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;z-index:1}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;color:var(--muted);font-size:14px;text-align:center}
.empty-icon{font-size:46px}

/* ── Bannière d'installation PWA ── */
#install-banner{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:500px;background:#fff;border-top:1.5px solid #E4E6F0;padding:14px 18px calc(14px + env(safe-area-inset-bottom,0px));display:flex;align-items:center;gap:12px;z-index:10000;transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 24px rgba(0,0,0,.10)}
#install-banner.show{transform:translateX(-50%) translateY(0)}
#install-banner .ib-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#E8284A,#F5C518);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
#install-banner .ib-text{flex:1}
#install-banner .ib-title{font-weight:800;font-size:14px;color:#18182E}
#install-banner .ib-sub{font-size:12px;color:#8888AA;margin-top:2px}
#install-banner .ib-btn{background:#E8284A;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;font-family:inherit}
#install-banner .ib-close{background:none;border:none;color:#8888AA;font-size:20px;cursor:pointer;padding:4px;line-height:1;font-family:inherit}

/* ── Splash screen ── */
#splash{position:fixed;inset:0;background:linear-gradient(160deg,#E8284A,#F5C518);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .5s,transform .5s}
#splash.hide{opacity:0;transform:scale(1.06);pointer-events:none}

#splash .sp-title{font-family:Georgia,serif;font-size:42px;font-weight:900;color:#fff;letter-spacing:-1.5px}

<script>
'use strict';

// ══════════════════════════════════════════════════════
//  RÈGLE D'OR : les callbacks d'input/textarea mutent S
//  directement (S.foo = v) SANS jamais appeler draw().
//  draw() n'est appelé que sur : clics boutons, selects,
//  envoi de formulaire, navigation.
// ══════════════════════════════════════════════════════

// ── Toast ───────────────────────────────────────────
function toast(msg, ms) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, ms||2200);
}

// ══════════════════════════════════════════════════════
//  SUPABASE — Base de données en temps réel
//  Toutes les interactions sont partagées entre utilisateurs
// ══════════════════════════════════════════════════════
var SB_URL = 'https://ugqsicpfuxngmguyjwod.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVncXNpY3BmdXhuZ21ndXlqd29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjQ0NzksImV4cCI6MjA5MDk0MDQ3OX0.9QKqTOQtnZ8sxf1FX36IaoudDosbfViVsZBKtO4qqQ8';

var SB_HEADERS = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

// Requête Supabase générique
function sbFetch(method, table, body, params){
  var url = SB_URL + '/rest/v1/' + table;
  if(params) url += '?' + params;
  return fetch(url, {
    method: method,
    headers: SB_HEADERS,
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r){ return r.json(); }).catch(function(){ return null; });
}

// ── API Posts ────────────────────────────────────────
function sbGetPosts(){
  return sbFetch('GET','posts',null,'order=created_at.desc&limit=100');
}
function sbInsertPost(post){
  return sbFetch('POST','posts',post);
}
function sbDeletePost(id){
  return fetch(SB_URL+'/rest/v1/posts?id=eq.'+id, {
    method:'DELETE', headers:SB_HEADERS
  });
}

// ── API Comptes utilisateurs ─────────────────────────
function sbGetAccounts(){
  return sbFetch('GET','accounts',null,'limit=500');
}
function sbUpsertAccount(acc){
  return fetch(SB_URL+'/rest/v1/accounts', {
    method:'POST',
    headers: Object.assign({},SB_HEADERS,{'Prefer':'resolution=merge-duplicates,return=representation'}),
    body: JSON.stringify(acc)
  }).then(function(r){return r.json();}).catch(function(){return null;});
}

// ── API Salons ───────────────────────────────────────
function sbGetRooms(){

}

  return sbFetch('POST','rooms',room);
}
function sbUpdateRoom(id, data){

// ── API Messages ─────────────────────────────────────
function sbGetMessages(roomId){
  return sbFetch('GET','messages',null,'room_id=eq.'+roomId+'&order=created_at.asc&limit=200');
}
function sbInsertMessage(msg){
  return sbFetch('POST','messages',msg);
}

// ── Temps réel via Supabase Realtime (WebSocket) ─────
var _realtimeWs = null;
function startRealtime(){
  if(_realtimeWs) return;
  var wsUrl = SB_URL.replace('https://','wss://') + '/realtime/v1/websocket?apikey=' + SB_KEY + '&vsn=1.0.0';
  try {
    _realtimeWs = new WebSocket(wsUrl);
    _realtimeWs.onopen = function(){
      // S'abonner aux changements sur posts, messages, rooms
      ['posts','messages','rooms'].forEach(function(table){
        _realtimeWs.send(JSON.stringify({
          topic: 'realtime:public:'+table,
          event: 'phx_join',
          payload: {},
          ref: table
        }));
      });
    };
    _realtimeWs.onmessage = function(e){
      try {
        var msg = JSON.parse(e.data);
        var payload = msg.payload;
        if(!payload || !payload.type) return;
        var rec = payload.record || payload.old_record;
        var table = (msg.topic||'').split(':')[2];

        if(table==='posts'){
          if(payload.type==='INSERT'){
            if(!S.posts.find(function(p){return p.id===rec.id;})){
              S.posts.unshift(formatPost(rec));
              if(S.tab==='feed'&&!S.view) draw();
            }
          }
          if(payload.type==='DELETE'){
            S.posts = S.posts.filter(function(p){return p.id!==rec.id;});
            if(S.view==='detail'&&S.selPost&&S.selPost.id===rec.id) set({view:null,selPost:null});
            else if(S.tab==='feed'&&!S.view) draw();
          }
        }
        if(table==='messages'){
          if(payload.type==='INSERT'){
            var rIdx = S.rooms.findIndex(function(r){return r.id===rec.room_id;});
            if(rIdx>=0){
              if(!S.rooms[rIdx].messages.find(function(m){return m.id===rec.id;})){
                S.rooms[rIdx].messages.push(formatMessage(rec));
                if(S.view==='roomview'&&S.selRoom&&S.selRoom.id===rec.room_id){
                  S.selRoom=S.rooms[rIdx]; draw(); setTimeout(scrollChat,50);
                }
              }
            }
          }
        }
        if(table==='rooms'){
          if(payload.type==='INSERT'){
            if(!S.rooms.find(function(r){return r.id===rec.id;})){
              S.rooms.push(formatRoom(rec));
              if(S.tab==='chat'&&!S.view) draw();
            }
          }
          if(payload.type==='UPDATE'){
            var ri=S.rooms.findIndex(function(r){return r.id===rec.id;});
            if(ri>=0){ S.rooms[ri]=formatRoom(rec); if(S.view==='roomview'&&S.selRoom&&S.selRoom.id===rec.id){S.selRoom=S.rooms[ri];draw();} }
          }
        }
      } catch(err){}
    };
    _realtimeWs.onerror = function(){};
    _realtimeWs.onclose = function(){
      _realtimeWs=null;
      setTimeout(startRealtime, 3000); // reconnexion auto
    };
  } catch(e){}
}

// ── Formateurs (Supabase → format interne) ───────────
function formatPost(r){
  return {
    id:r.id, authorId:r.author_id, authorName:r.author_name,
    subject:r.subject, type:r.type, title:r.title,
    description:r.description||'', dueDate:r.due_date||'',
    files:r.files||[], createdAt:fmtAge(r.created_at)
  };
}
function formatRoom(r){
  return {
    id:r.id, name:r.name, emoji:r.emoji||'💬',
    desc:r.description||'', ownerId:r.owner_id||'',
    members:r.members||[], maxMembers:r.max_members||5,
    messages:r.messages||[]
  };
}
function formatMessage(r){
  return {
    id:r.id, authorId:r.author_id, authorName:r.author_name,
    text:r.text, time:fmtTime(r.created_at)
  };
}
function fmtAge(iso){
  if(!iso) return 'À l\'instant';
  var diff=Math.floor((Date.now()-new Date(iso).getTime())/1000);
  if(diff<60) return 'À l\'instant';
  if(diff<3600) return 'il y a '+Math.floor(diff/60)+'min';
  if(diff<86400) return 'il y a '+Math.floor(diff/3600)+'h';
  return 'il y a '+Math.floor(diff/86400)+'j';
}
function fmtTime(iso){
  if(!iso) return nowT();
  return new Date(iso).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

// ── Chargement initial depuis Supabase ────────────────
var _loaded = false;
function loadFromSupabase(){
  Promise.all([sbGetPosts(), sbGetRooms(), sbGetAccounts()]).then(function(results){
    var posts = results[0];
    var rooms = results[1];
    var accounts = results[2];

    if(Array.isArray(posts)){
      // Si la base est vide, on insère les publications de démo
      if(posts.length === 0){
        seedSupabase();
      } else {
        S.posts = posts.map(formatPost);
      }
    }

    if(Array.isArray(rooms) && rooms.length >= 0){
      var roomObjs = rooms.map(formatRoom);
      var msgPromises = roomObjs.map(function(room){
        return sbGetMessages(room.id).then(function(msgs){
          room.messages = Array.isArray(msgs) ? msgs.map(formatMessage) : [];
          return room;
        });
      });
      return Promise.all(msgPromises).then(function(filledRooms){
        S.rooms = filledRooms.length > 0 ? filledRooms : S.rooms;
        if(Array.isArray(accounts)){
          accounts.forEach(function(a){
            S.accounts[a.id] = {
              id:a.id, name:a.name, role:a.role,
              subject:a.subject||'Maths', bio:a.bio||'',
              avatar:a.avatar||null, color:a.color||'#3B82F6',
              ratings:a.ratings||[]
            };
          });
        }
        _loaded=true; draw(); startRealtime();
      });
    }
    _loaded=true; draw(); startRealtime();
  }).catch(function(){
    _loaded=true; draw(); startRealtime();
  });
}

// ── Constantes ──────────────────────────────────────
var COLORS=["#E8284A","#18C964","#F5C518","#3B82F6","#A855F7","#F97316","#EC4899","#0EA5E9"];
var SUB_CLR={Maths:"#E8284A",Français:"#18C964",Histoire:"#F5C518",Sciences:"#0EA5E9",Anglais:"#A855F7",Physique:"#F97316",Philo:"#EC4899"};
var SUBJECTS=["Maths","Français","Histoire","Sciences","Anglais","Physique","Philo"];

function fileIco(n){var e=(n||"").split(".").pop().toLowerCase();if(["jpg","jpeg","png","gif","webp"].includes(e))return"🖼️";if(e==="pdf")return"📄";if(["doc","docx"].includes(e))return"📝";return"📎";}

// ── Codes administrateurs (chiffrés SHA-256) ─────────
// Les codes en clair ne sont JAMAIS stockés dans ce fichier.
// Seuls leurs empreintes SHA-256 sont présentes — irréversibles.
var ADMIN_HASHES = {
  'a68031d8b27f7d1c02d5b946e6981fc6dc28154e366e9e6eeb7df76b7349517a': 'Daaix1306',
  'd94a63b19a8a6d773cacf585a29ad558c41b44fcaadb812852d7c21246d40496': 'Azizx'
};

// Calcule le hash SHA-256 d'une chaîne via l'API Web Crypto (native, aucune lib)
function sha256(str){
  var buf = new TextEncoder().encode(str);
  return crypto.subtle.digest('SHA-256', buf).then(function(hash){
    return Array.from(new Uint8Array(hash)).map(function(b){
      return b.toString(16).padStart(2,'0');
    }).join('');
  });
}

// Vérifie le code admin : renvoie une Promise<string|null>
// (nom admin si valide, null sinon)
function checkAdminCode(code){
  return sha256(code.trim()).then(function(hash){
    return ADMIN_HASHES[hash] || null;
  });
}

// ── Helpers DOM ──────────────────────────────────────
function h(tag, attrs) {
  var e = document.createElement(tag);
  var kids = Array.prototype.slice.call(arguments,2);
  if (attrs) for (var k in attrs) {
    var v = attrs[k];
    if (k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if (k==='cls') e.className=v;
    else if (k.slice(0,2)==='on') e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  kids.forEach(function(c){
    if(c==null||c===false) return;
    if(Array.isArray(c)) c.forEach(function(cc){if(cc) e.appendChild(typeof cc==='string'?document.createTextNode(cc):cc);});
    else e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}
function tx(s){return document.createTextNode(String(s!=null?s:''));}

// ── Inputs : mutation silencieuse, AUCUN draw() ──────
// Le callback reçoit la valeur et doit juste écrire dans S.xxx = v.
// draw() ne sera appelé QUE sur submit/action explicite.
function Inp(val,cb,ph,err,extra){
  var e=h('input',Object.assign({cls:'inp'+(err?' err':''),placeholder:ph||''},extra||{}));
  e.value=val||'';
  e.addEventListener('input',function(ev){cb(ev.target.value);});
  return e;
}
function TA(val,cb,ph,rows){
  var e=h('textarea',{cls:'inp',placeholder:ph||'',rows:rows||4,style:{resize:'none',lineHeight:'1.6'}});
  e.value=val||'';
  e.addEventListener('input',function(ev){cb(ev.target.value);});
  return e;
}
// Sel : change = clic utilisateur, draw() OK
function Sel(val,cb,opts){
  var e=h('select',{cls:'inp',style:{padding:'10px',cursor:'pointer'}},
    opts.map(function(o){return h('option',{value:o},tx(o));}));
  e.value=val||opts[0];
  e.addEventListener('change',function(ev){cb(ev.target.value);});
  return e;
}

function doNext(){
  var s=S.setup;

  // Étape 1 → vérif nom obligatoire
  if(s.step===1 && !s.name.trim()){
    S.setup.nameErr=true; draw();
    setTimeout(function(){S.setup.nameErr=false;},800);
    return;
  }

  // Étape 1 → Professeur → quiz pédagogique (étape 15)
  if(s.step===1 && s.role==='Professeur'){
    S.setup.step=15; S.setup.quizAns=''; S.setup.quizErr=false; draw(); return;
  }

  // Étape 1 → Administration → saisie du code secret (étape 16)
  if(s.step===1 && s.role==='Administration'){
    S.setup.step=16; S.setup.adminCode=''; S.setup.adminCodeErr=false; draw(); return;
  }

  // Étape 1 → Élève : passer à l'étape 2
  if(s.step===1){S.setup.step=2; draw(); return;}

  // Étape 15 (quiz prof) → vérifier la réponse
  if(s.step===15){
    var qdata=getQuestion();
    if(!s.quizAns.trim()||!checkAnswer(s.quizAns, qdata.r)){
      S.setup.quizErr=true; draw();
      setTimeout(function(){S.setup.quizErr=false; draw();},2500);
      return;
    }
    S.setup.step=2; S.setup.quizErr=false; draw(); return;
  }

  // Étape 16 (code admin) → vérifier le code via SHA-256
  if(s.step===16){
    if(!s.adminCode.trim()){
      S.setup.adminCodeErr=true; draw();
      setTimeout(function(){S.setup.adminCodeErr=false; draw();},2500);
      return;
    }
    // Vérification asynchrone — on hash le code saisi et on compare
    checkAdminCode(s.adminCode).then(function(adminName){
      if(!adminName){
        S.setup.adminCodeErr=true; draw();
        setTimeout(function(){S.setup.adminCodeErr=false; draw();},2500);
        return;
      }
      // Code valide → forcer le nom de l'admin correspondant
      S.setup.name = adminName;
      S.setup.step=2; S.setup.adminCodeErr=false; draw();
    });
    return;
  }

  // Étapes 2 → 3
  if(s.step<3){S.setup.step++;draw();return;}

  // Étape 3 : créer le compte
  var id='u_'+Date.now();
  var isAdminSignup = s.role==='Administration';
  var acc={
    id:id,
    name:s.name.trim(),
    role:isAdminSignup?'Administration':s.role,
    subject:s.subject,
    bio:s.bio,
    avatar:s.avatar,
    color:isAdminSignup?'#18182E':s.color,
    ratings:[]
  };
  S.accounts[id]=acc; S.user=acc; saveUser();
  if(isAdminSignup) toast('🛡️ Bienvenue Administrateur '+s.name+' !',3000);
  else toast('🎉 Bienvenue, '+s.name.split(' ')[0]+' !');
  set({tab:'feed',view:null});
}

    mr.appendChild(h('div',{style:{marginLeft:i>0?'-7px':'0'}},Avatar(m,24,9)));

  mb.appendChild(h('span',{style:{marginLeft:'auto',fontSize:'11px',color:'#18C964',fontWeight:700}},'● En direct'));

    em.appendChild(h('div',{style:{fontSize:'40px',marginBottom:'9px'}},'💬'));
    em.appendChild(h('div',{},tx('Aucun message — soyez le premier !')));
    msgs.appendChild(em);
  }
  live.messages.forEach(function(msg,i){
    var isMe=msg.authorId===S.user.id;
    var sender=S.accounts[msg.authorId];
    var row=h('div',{cls:'msganim',style:{display:'flex',flexDirection:isMe?'row-reverse':'row',alignItems:'flex-end',gap:'7px',animationDelay:(i*.01)+'s'}});
    if(!isMe) row.appendChild(Avatar(sender||{name:msg.authorName,color:'#8888AA'},28,11));
    var col=h('div',{style:{maxWidth:'74%'}});
    if(!isMe){
      var nl=h('div',{style:{color:'#8888AA',fontSize:'10px',fontWeight:700,marginBottom:'2px',marginLeft:'3px'}},tx(msg.authorName));
      if(sender&&sender.role==='Professeur') nl.appendChild(Pill('Prof','#FFFBEA','#996900',{fontSize:'9px',padding:'1px 5px',marginLeft:'4px'}));
      col.appendChild(nl);
    }
    col.appendChild(h('div',{style:{
      background:isMe?('linear-gradient(135deg,'+uc+','+uc+'cc)'):'#fff',
      color:isMe?'#fff':'#18182E',
      borderRadius:isMe?'17px 17px 4px 17px':'17px 17px 17px 4px',
      padding:'9px 13px',fontSize:'14px',lineHeight:1.5,
      border:isMe?'none':'1.5px solid #E4E6F0',boxShadow:'0 1px 6px rgba(0,0,0,.05)'
    }},tx(msg.text)));
    col.appendChild(h('div',{style:{color:'#8888AA',fontSize:'10px',marginTop:'2px',textAlign:isMe?'right':'left'}},tx(msg.time)));
    row.appendChild(col); msgs.appendChild(row);
  });
  setTimeout(scrollChat,30);
  wrap.appendChild(msgs);

  // Zone de saisie — le input de chat ne doit JAMAIS déclencher draw()
  var ib=h('div',{style:{background:'#fff',borderTop:'1.5px solid #E4E6F0',
    padding:'11px 13px calc(11px + env(safe-area-inset-bottom,0px))',
    display:'flex',gap:'7px',alignItems:'center',flexShrink:0}});
  var ci=h('input',{cls:'inp',placeholder:'Écrire un message…',style:{flex:1,padding:'10px 13px',borderRadius:'22px'}});
  ci.value=S.chatMsg||'';

  var sendBtn=h('button',{style:{
    width:'42px',height:'42px',borderRadius:'50%',
    background:S.chatMsg&&S.chatMsg.trim()?('linear-gradient(135deg,'+uc+','+uc+'cc)'):'#e5e7f0',
    color:S.chatMsg&&S.chatMsg.trim()?'#fff':'#8888AA',
    border:'none',fontSize:'17px',display:'flex',alignItems:'center',justifyContent:'center',

  ci.addEventListener('input',function(e){
    S.chatMsg=e.target.value;

    sendBtn.style.background=hasText?('linear-gradient(135deg,'+uc+','+uc+'cc)'):'#e5e7f0';
    sendBtn.style.color=hasText?'#fff':'#8888AA';
  });
  ci.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend(live,ci.value);}
  });
  sendBtn.addEventListener('click',function(){doSend(live,ci.value);});
  ib.appendChild(ci); ib.appendChild(sendBtn); wrap.appendChild(ib);
  return wrap;
}

function doSend(room,text){
  if(!text||!text.trim()) return;
  var msg={id:'m_'+Date.now()+'_'+S.user.id,authorId:S.user.id,authorName:S.user.name,text:text.trim(),time:nowT()};
  var idx=S.rooms.findIndex(function(r){return r.id===room.id;});
  if(idx>=0) S.rooms[idx].messages.push(msg);
  saveRooms();
  // Envoi vers Supabase (tous les utilisateurs le verront en temps réel)
  sbInsertMessage({
    id: msg.id,
    room_id: room.id,
    author_id: S.user.id,
    author_name: S.user.name,
    text: msg.text
  });
  S.chatMsg=''; S.selRoom=S.rooms[idx];
  draw(); setTimeout(scrollChat,50);
}

// ── PROFIL UTILISATEUR ───────────────────────────────

  var myRooms=S.rooms.filter(function(r){return r.members.includes(u.id);}).length;
  var wrap=h('div',{style:{padding:'14px 16px 110px',overflowY:'auto',flex:1}});

  var hc=h('div',{cls:'card',style:{overflow:'hidden',marginBottom:'13px'}});
  hc.appendChild(h('div',{style:{height:'74px',background:'linear-gradient(135deg,'+uc+','+uc+'77)'}}));
  var hcb=h('div',{style:{padding:'0 18px 18px',marginTop:'-36px'}});
  hcb.appendChild(Avatar(u,70,28));
  var hci=h('div',{style:{marginTop:'9px'}});
  hci.appendChild(h('div',{style:{fontFamily:'Georgia,serif',fontSize:'21px',fontWeight:900,color:'#18182E'}},tx(u.name)));
  var tr=h('div',{style:{display:'flex',gap:'5px',marginTop:'4px',flexWrap:'wrap'}});
  tr.appendChild(Pill(u.role,uc+'18',uc)); tr.appendChild(Pill(u.subject,'#E4E6F0','#8888AA'));
  hci.appendChild(tr);
  hci.appendChild(h('div',{style:{color:'#3D3D5C',fontSize:'13px',lineHeight:1.6,marginTop:'9px'}},tx(u.bio||'Aucune description.')));
  hcb.appendChild(hci); hc.appendChild(hcb); wrap.appendChild(hc);

  var brow=h('div',{style:{display:'flex',gap:'9px',marginBottom:'13px'}});
  brow.appendChild(Btn('✏️ Modifier',function(){set({editF:{name:u.name,bio:u.bio||'',subject:u.subject,color:u.color||COLORS[3]},view:'editprofile'});},{flex:1,background:'#fff',border:'1.5px solid #E4E6F0',borderRadius:'13px',padding:'11px',fontSize:'13px',fontWeight:700,color:'#3D3D5C'}));
  brow.appendChild(Btn('🚪 Déconnexion',function(){
    if(confirm('Se déconnecter ?')){S.user=null;saveUser();set({tab:'feed',view:null});}
  },{flex:1,background:'#FFF0F2',border:'1.5px solid #E8284A',borderRadius:'13px',padding:'11px',fontSize:'13px',fontWeight:700,color:'#E8284A'}));
  wrap.appendChild(brow);

  var sg=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'9px',marginBottom:'15px'}});
  var roleLabel=u.role==='Professeur'?'Prof':u.role==='Administration'?'Admin':'Élève';
  [{l:'Publications',v:myPosts.length,bg:'#FFF0F2',c:'#E8284A'},{l:'Salons',v:myRooms,bg:'#EFF6FF',c:'#3B82F6'},{l:'Rôle',v:roleLabel,bg:'#E6FFF2',c:'#18C964'}].forEach(function(s){
    var sc=h('div',{style:{background:s.bg,borderRadius:'14px',padding:'13px 7px',textAlign:'center'}});
    sc.appendChild(h('div',{style:{fontSize:typeof s.v==='string'?'12px':'21px',fontWeight:900,color:s.c,fontFamily:'Georgia,serif',wordBreak:'break-word'}},tx(s.v)));
    sc.appendChild(h('div',{style:{fontSize:'11px',color:s.c,fontWeight:600,marginTop:'2px'}},tx(s.l)));
    sg.appendChild(sc);
  });
  wrap.appendChild(sg);

  if(myPosts.length){
    wrap.appendChild(SecT('Mes publications ('+myPosts.length+')'));
    myPosts.forEach(function(post,i){
      var pac=acOf(post.subject);
      var pcard=h('div',{cls:'card fade',style:{padding:'13px 15px',marginBottom:'9px',cursor:'pointer',animationDelay:(i*.05)+'s'}});
      pcard.addEventListener('click',function(){set({selPost:post,view:'detail'});});
      pcard.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5px'}},
        Pill((TYPE_ICO[post.type]||'📄')+' '+post.type,pac+'18',pac),
        h('span',{style:{color:'#8888AA',fontSize:'11px'}},tx(post.createdAt))
      ));
      pcard.appendChild(h('div',{style:{fontWeight:700,color:'#18182E',fontSize:'14px'}},tx(post.title)));
      wrap.appendChild(pcard);
    });
  }
  return wrap;
}

// ── CRÉER PUBLICATION ────────────────────────────────
function buildCreate(){
  var u=S.user;
  if(S.published) return h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flex:1,gap:'14px',animation:'pop .3s ease'}},
    h('div',{style:{width:'76px',height:'76px',borderRadius:'50%',background:'#E6FFF2',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'38px'}},'✅'),
    h('div',{style:{fontFamily:'Georgia,serif',fontSize:'21px',fontWeight:900,color:'#18182E'}},'Publié !'),
    h('div',{style:{color:'#8888AA',fontSize:'13px'}},'Visible par tous les élèves')
  );
  var p=S.pub;
  var wrap=h('div',{cls:'fade',style:{padding:'14px 16px 110px',overflowY:'auto',flex:1,display:'flex',flexDirection:'column',gap:'13px'}});
  wrap.appendChild(h('div',{style:{fontFamily:'Georgia,serif',fontSize:'19px',fontWeight:900,color:'#18182E'}},'Nouvelle publication'));

  var ac=h('div',{cls:'card',style:{padding:'11px 14px',display:'flex',alignItems:'center',gap:'9px',background:'#FFF0F2'}});
  ac.appendChild(Avatar(u,34,14));
  ac.appendChild(h('div',{},h('div',{style:{fontWeight:700,color:'#18182E',fontSize:'13px'}},tx(u.name)),h('div',{style:{color:'#8888AA',fontSize:'11px'}},tx(u.subject+' · '+u.role))));
  wrap.appendChild(ac);

  // ✅ Tous les inputs texte : mutation silencieuse
  wrap.appendChild(h('div',{},Label('Titre *'),
    Inp(p.title,function(v){S.pub.title=v;},'ex: Exercice sur les intégrales',S.pubTried&&!p.title)));

  var g=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'11px'}});
  // Selects → onChange → draw() OK
  g.appendChild(h('div',{},Label('Matière'),Sel(p.subject,function(v){S.pub.subject=v;},SUBJECTS)));
  g.appendChild(h('div',{},Label('Type'),Sel(p.type,function(v){S.pub.type=v;},TYPES)));
  wrap.appendChild(g);

  wrap.appendChild(h('div',{},Label('Contenu / Énoncé'),
    TA(p.desc,function(v){S.pub.desc=v;},'Énoncé, consignes, exercices…',5)));

  wrap.appendChild(h('div',{},Label('📅 Date de rendu (optionnel)'),
    Inp(p.dueDate||'',function(v){S.pub.dueDate=v;},'ex: Vendredi 11 avril',false)));

  // Pièces jointes
  wrap.appendChild(Label('📎 Pièces jointes'));
  if(p.files&&p.files.length){
    var fl=h('div',{style:{display:'flex',flexDirection:'column',gap:'6px',marginBottom:'7px'}});
    p.files.forEach(function(f,i){
      fl.appendChild(h('div',{style:{background:'#F4F6FB',border:'1.5px solid #E4E6F0',borderRadius:'9px',padding:'8px 11px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:'7px'}},
          h('span',{style:{fontSize:'15px'}},tx(fileIco(f.name))),
          h('div',{},h('div',{style:{color:'#18182E',fontSize:'12px',fontWeight:600}},tx(f.name)),h('div',{style:{color:'#8888AA',fontSize:'11px'}},tx(f.size)))
        ),
        Btn('✕',function(){S.pub.files.splice(i,1);draw();},{background:'none',color:'#8888AA',fontSize:'14px',padding:'1px 5px'})
      ));
    });
    wrap.appendChild(fl);
  }
  var fbrow=h('div',{style:{display:'flex',gap:'7px',marginBottom:'4px'}});
  fbrow.appendChild(Btn('🖼️ Photos',function(){pickImg(function(f){S.pub.files.push(f);draw();});},{flex:1,background:'#FFFBEA',border:'2px dashed #FFE066',borderRadius:'11px',padding:'9px 10px',fontSize:'12px',fontWeight:700,color:'#996900'}));
  fbrow.appendChild(Btn('📄 Documents',function(){pickDoc(function(f){S.pub.files.push(f);draw();});},{flex:1,background:'#E6FFF2',border:'2px dashed #5DDBA5',borderRadius:'11px',padding:'9px 10px',fontSize:'12px',fontWeight:700,color:'#18C964'}));
  wrap.appendChild(fbrow);

  wrap.appendChild(Btn('📢 Publier maintenant',function(){
    if(!S.pub.title.trim()){S.pubTried=true;draw();toast('⚠️ Entrez un titre');return;}
    var post={id:'p_'+Date.now(),authorId:u.id,authorName:u.name,subject:S.pub.subject,type:S.pub.type,
      title:S.pub.title.trim(),description:S.pub.desc,createdAt:"À l'instant",
      dueDate:S.pub.dueDate||'',files:S.pub.files.slice()};
    S.posts.unshift(post); savePosts();
    // Publication Supabase (visible par tous en temps réel)
    sbInsertPost({
      id: post.id,
      author_id: post.authorId,
      author_name: post.authorName,
      subject: post.subject,
      type: post.type,
      title: post.title,
      description: post.description,
      due_date: post.dueDate||null,
      files: post.files
    });
    S.published=true; S.pubTried=false;
    S.pub={title:'',subject:'Maths',type:'Exercice',desc:'',dueDate:'',files:[]};
    draw();
    setTimeout(function(){set({published:false,tab:'feed'});},1600);
  },{marginTop:'4px',width:'100%',background:'linear-gradient(135deg,#E8284A,#F95C73)',color:'#fff',borderRadius:'14px',padding:'14px',fontSize:'15px',fontWeight:800,boxShadow:'0 5px 20px rgba(232,40,74,.3)'}));
  return wrap;
}

// ════════════════════════════════════════════════════
//  DRAW PRINCIPAL
// ════════════════════════════════════════════════════
function draw(){
  var root=document.getElementById('app');
  root.innerHTML='';

  if(!S.user){
    var splash=h('div',{style:{background:'linear-gradient(160deg,#E8284A,#F5C518)',flexShrink:0,padding:'32px 24px 0',display:'flex',flexDirection:'column',alignItems:'center'}});
    splash.appendChild(h('div',{style:{width:'84px',height:'84px',borderRadius:'24px',background:'rgba(255,255,255,.22)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'42px',marginBottom:'16px',boxShadow:'0 7px 28px rgba(0,0,0,.18)'}},'🎓'));
    splash.appendChild(h('div',{style:{fontFamily:'Georgia,serif',fontSize:'36px',fontWeight:900,color:'#fff',letterSpacing:'-1.2px',textAlign:'center',lineHeight:1.05,marginBottom:'8px'}},'EduBoard'));
    splash.appendChild(h('div',{style:{color:'rgba(255,255,255,.8)',fontSize:'14px',textAlign:'center',lineHeight:1.6}},'Devoirs · Exercices · Discussions'));
    root.appendChild(splash);
    var card=h('div',{style:{background:'#fff',borderRadius:'24px 24px 0 0',flex:1,overflowY:'auto',marginTop:'20px'}});
    card.appendChild(buildSetup());
    root.appendChild(card);
    return;
  }

  root.appendChild(buildTopBar());
  var body=h('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}});

  if(S.view==='detail')           body.appendChild(buildDetail());
  else if(S.view==='profview')    body.appendChild(buildProfView());
  else if(S.view==='editprofile') body.appendChild(buildEditProfile());
  else if(S.view==='roomview')    body.appendChild(buildRoomChat());
  else if(S.view==='createroom')  body.appendChild(buildCreateRoom());
  else if(S.tab==='feed')         body.appendChild(buildFeed());
  else if(S.tab==='chat')         body.appendChild(buildChat());
  else if(S.tab==='teachers')     body.appendChild(buildTeachers());
  else if(S.tab==='profile')      body.appendChild(buildProfile());
  else if(S.tab==='create')       body.appendChild(buildCreate());

  root.appendChild(body);
  if(!S.view) root.appendChild(buildNav());
}

}

// ── Service Worker (cache offline) ──────────────────
if('serviceWorker' in navigator){
  var swCode=[
    "const CACHE='eduboard-v1';",
    "self.addEventListener('install',e=>{self.skipWaiting();});",
    "self.addEventListener('activate',e=>{",
    "  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));",
    "});",
    "self.addEventListener('fetch',e=>{",
    "  if(e.request.method!=='GET') return;",
    "  e.respondWith(caches.open(CACHE).then(c=>c.match(e.request).then(r=>{",
    "    var f=fetch(e.request).then(res=>{c.put(e.request,res.clone());return res;}).catch(()=>r);",
    "    return r||f;",
    "  })));",
    "});"
  ].join('\n');
  var swBlob=new Blob([swCode],{type:'text/javascript'});
  var swUrl=URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(function(){});
}

// ── Bannière d'installation PWA ──────────────────────
var _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  _deferredPrompt=e;
  setTimeout(function(){
    var b=document.getElementById('install-banner');
    if(b) b.classList.add('show');
  },3000);
});
window.addEventListener('appinstalled',function(){
  var b=document.getElementById('install-banner');
  if(b) b.classList.remove('show');
  toast('✅ EduBoard installé sur votre écran d\'accueil !',3000);
});
document.addEventListener('DOMContentLoaded',function(){
  var btn=document.getElementById('install-btn');
  var close=document.getElementById('install-close');
  if(btn) btn.addEventListener('click',function(){
    var b=document.getElementById('install-banner');
    if(b) b.classList.remove('show');
    if(_deferredPrompt){ _deferredPrompt.prompt(); _deferredPrompt=null; }
  });
  if(close) close.addEventListener('click',function(){
    var b=document.getElementById('install-banner');
    if(b) b.classList.remove('show');
  });
});
