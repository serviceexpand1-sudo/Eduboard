/* ══════════════════════════════════════════
   SHARED UI COMPONENTS
══════════════════════════════════════════ */
function Avatar({ acc, size=40, fs=16 }) {
  const bg = acc?.color || acOf(acc?.subject) || C.blue;
  if (!acc) return <div style={{width:size,height:size,borderRadius:"50%",background:C.border,flexShrink:0}}/>;
  if (acc.avatar) return (
    <img src={acc.avatar} alt="" style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",
      border:`2px solid ${C.white}`,boxShadow:"0 2px 8px rgba(0,0,0,.1)",flexShrink:0}}/>
  );
  return (
    <div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,
      background:`linear-gradient(135deg,${bg},${bg}bb)`,
      display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:fs,color:"#fff",fontWeight:900,
      border:`2px solid ${C.white}`,boxShadow:"0 2px 8px rgba(0,0,0,.1)"}}>
      {(acc.name||"?").trim()[0].toUpperCase()}
    </div>
  );
}

function StarRow({ val, size=14, onPick }) {
  const n = parseFloat(val) || 0;
  return (
    <span>
      {[1,2,3,4,5].map(i => (
        <span key={i}
          onClick={onPick ? () => onPick(i) : undefined}
          style={{color: i<=Math.round(n) ? C.yellow : C.border, fontSize:size,
            cursor: onPick ? "pointer" : "default", userSelect:"none"}}>★</span>
      ))}
    </span>
  );
}

function Label({ children }) {
  return <div style={{color:C.ink2,fontSize:12,fontWeight:700,marginBottom:6}}>{children}</div>;
}

function SecTitle({ children }) {
  return <div style={{color:C.muted,fontSize:11,fontWeight:700,textTransform:"uppercase",
    letterSpacing:1.2,marginBottom:10}}>{children}</div>;
}

function Btn({ children, onClick, style={}, disabled=false }) {
  return (
    <button onClick={onClick} disabled={disabled}
      style={{fontFamily:"inherit",cursor:disabled?"not-allowed":"pointer",border:"none",
        transition:"opacity .15s, transform .15s",opacity:disabled?.5:1, ...style}}>
      {children}
    </button>
  );
}

/* ══════════════════════════════════════════
   SETUP WIZARD (3 steps — fully bug-free)
══════════════════════════════════════════ */
function Setup({ onDone }) {
  const [step,    setStep]   = useState(1);
  const [name,    setName]   = useState("");
  const [role,    setRole]   = useState("Élève");
  const [subject, setSubject]= useState("Maths");
  const [bio,     setBio]    = useState("");
  const [avatar,  setAvatar] = useState(null);
  const [color,   setColor]  = useState(COLORS[3]);
  const [nameErr, setNameErr]= useState(false);

  /* pick avatar image */
  function pickAvatar() {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = "image/*";
    inp.onchange = e => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = ev => setAvatar(ev.target.result);
      r.readAsDataURL(f);
    };
    inp.click();
  }

  function handleNext() {
    if (step === 1) {
      if (!name.trim()) {
        setNameErr(true);
        setTimeout(() => setNameErr(false), 800);
        return;
      }
    }
    if (step < 3) { setStep(s => s+1); return; }
    /* step 3 → finish */
    const id  = "u_" + Date.now();
    const acc = { id, name:name.trim(), role, subject, bio, avatar, color, ratings:[] };
    onDone(acc);
  }

  const pct = (step/3)*100;

  return (
    <div style={{flex:1,overflowY:"auto",padding:"24px 24px 48px",
      animation: nameErr ? "shake .5s ease" : "fadeUp .35s ease"}}>

      {/* progress */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:28}}>
        {step > 1 && (
          <Btn onClick={() => setStep(s => s-1)}
            style={{background:"none",color:C.muted,fontSize:18,fontWeight:700,padding:0}}>←</Btn>
        )}
        <div style={{flex:1,height:6,background:C.border,borderRadius:10}}>
          <div style={{width:`${pct}%`,height:"100%",borderRadius:10,transition:"width .35s",
            background:`linear-gradient(90deg,${C.red},${C.yellow})`}}/>
        </div>
        <span style={{color:C.muted,fontSize:12,fontWeight:700,flexShrink:0}}>{step}/3</span>
      </div>

      {/* ── STEP 1 ── */}
      {step === 1 && (
        <>
          <h2 style={{fontFamily:"Georgia,serif",fontSize:26,fontWeight:900,color:C.ink,marginBottom:6}}>
            Qui êtes-vous ? 👋
          </h2>
          <p style={{color:C.muted,fontSize:13,marginBottom:24,lineHeight:1.6}}>
            Aucun mot de passe requis — accès immédiat.
          </p>

          <Label>Prénom et nom *</Label>
          <input
            value={name}
            onChange={e => { setName(e.target.value); if(nameErr) setNameErr(false); }}
            onKeyDown={e => e.key==="Enter" && handleNext()}
            placeholder="ex : Marie Dubois"
            autoFocus
            style={{...inputS(nameErr), marginBottom:6}}
          />
          {nameErr && (
            <p style={{color:C.red,fontSize:12,marginBottom:12,marginTop:2}}>
              ⚠️ Merci d'entrer votre nom pour continuer.
            </p>
          )}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:14}}>
            <div>
              <Label>Rôle</Label>
              <select value={role} onChange={e => setRole(e.target.value)}
                style={{width:"100%",background:C.bg,border:`1.5px solid ${C.border}`,
                  borderRadius:12,padding:"11px 10px",color:C.ink,fontSize:13,fontFamily:"inherit"}}>
                {ROLES.map(r => <option key={r}>{r}</option>)}
              </select>
            </div>
            <div>
              <Label>Matière</Label>
              <select value={subject} onChange={e => setSubject(e.target.value)}
                style={{width:"100%",background:C.bg,border:`1.5px solid ${C.border}`,
                  borderRadius:12,padding:"11px 10px",color:C.ink,fontSize:13,fontFamily:"inherit"}}>
                {SUBJECTS.map(s => <option key={s}>{s}</option>)}
              </select>
            </div>
          </div>
        </>
      )}

      {/* ── STEP 2 ── */}
      {step === 2 && (
        <>
          <h2 style={{fontFamily:"Georgia,serif",fontSize:26,fontWeight:900,color:C.ink,marginBottom:6}}>
            Personnalisez ! 🎨
          </h2>
          <p style={{color:C.muted,fontSize:13,marginBottom:24}}>Photo et couleur de profil.</p>

          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,marginBottom:22}}>
            <div style={{position:"relative",cursor:"pointer"}} onClick={pickAvatar}>
              <div style={{width:100,height:100,borderRadius:"50%",overflow:"hidden",
                background:`linear-gradient(135deg,${color},${color}99)`,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:42,color:"#fff",fontWeight:900,
                border:`3px solid ${C.white}`,boxShadow:"0 4px 20px rgba(0,0,0,.12)"}}>
                {avatar
                  ? <img src={avatar} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  : (name||"?")[0].toUpperCase()
                }
              </div>
              <div style={{position:"absolute",bottom:2,right:2,width:28,height:28,borderRadius:"50%",
                background:C.white,border:`1.5px solid ${C.border}`,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>📷</div>
            </div>
            {avatar && (
              <Btn onClick={() => setAvatar(null)}
                style={{background:"none",color:C.muted,fontSize:12,fontWeight:600}}>
                Supprimer la photo
              </Btn>
            )}
          </div>

          <Label>Couleur d'avatar</Label>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {COLORS.map(col => (
              <div key={col} onClick={() => setColor(col)}
                style={{width:36,height:36,borderRadius:"50%",background:col,cursor:"pointer",
                  border:`3px solid ${color===col ? C.ink : "transparent"}`,
                  boxShadow: color===col ? "0 0 0 2px white inset" : "none",
                  transition:"border .15s"}}/>
            ))}
          </div>
        </>
      )}

      {/* ── STEP 3 ── */}
      {step === 3 && (
        <>
          <h2 style={{fontFamily:"Georgia,serif",fontSize:26,fontWeight:900,color:C.ink,marginBottom:6}}>
            Présentez-vous ✍️
          </h2>
          <p style={{color:C.muted,fontSize:13,marginBottom:18}}>Bio optionnelle.</p>

          {/* preview card */}
          <div style={{...card(),padding:16,display:"flex",alignItems:"center",gap:14,marginBottom:18}}>
            <div style={{width:56,height:56,borderRadius:"50%",overflow:"hidden",flexShrink:0,
              background:`linear-gradient(135deg,${color},${color}99)`,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:22,color:"#fff",fontWeight:900}}>
              {avatar
                ? <img src={avatar} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                : (name||"?")[0].toUpperCase()
              }
            </div>
            <div>
              <div style={{fontWeight:800,color:C.ink,fontSize:15}}>{name||"Votre nom"}</div>
              <span style={pill(`${color}20`,color,{display:"inline-flex",marginTop:4})}>{role}</span>
            </div>
          </div>

          <Label>Bio (optionnel)</Label>
          <textarea
            rows={4}
            value={bio}
            onChange={e => setBio(e.target.value)}
            placeholder="Parlez de vous, vos matières préférées…"
            style={{...inputS(),resize:"none",lineHeight:1.65}}
          />
        </>
      )}

      <Btn onClick={handleNext}
        style={{marginTop:28,width:"100%",
          background:`linear-gradient(135deg,${C.red},${C.redM})`,
          color:"#fff",borderRadius:16,padding:"15px",
          fontSize:15,fontWeight:800,
          boxShadow:"0 5px 20px rgba(232,40,74,.28)"}}>
        {step < 3 ? "Suivant →" : "🚀 Entrer dans EduBoard"}
      </Btn>
    </div>
  );
}

  /* ── global state ── */

  const [selRoom, setSelRoom]= useState(null);

  const [published,setPublished]=useState(false);

  /* ── chat ── */
  const [chatMsg, setChatMsg] = useState("");
  const chatEndRef = useRef();

  const [crName,   setCrName]  = useState("");
  const [crEmoji,  setCrEmoji] = useState("💬");
  const [crDesc,   setCrDesc]  = useState("");
  const [crMax,    setCrMax]   = useState(5);
  const [crTeach,  setCrTeach] = useState("");

  /* ── ratings ── */
  const [pendR, setPendR] = useState({});
  const [doneR, setDoneR] = useState({});

  /* ── edit profile form ── */
  const [editName,  setEditName] = useState("");
  const [editBio,   setEditBio]  = useState("");
  const [editSubj,  setEditSubj] = useState(SUBJECTS[0]);
  const [editColor, setEditColor]= useState(COLORS[3]);
  const [editSaved, setEditSaved]= useState(false);

  /* ── derived ── */
  const canPublish  = user?.role === "Professeur";
  const uc          = user?.color || C.blue;
  const allTeachers = Object.values(accounts).filter(a => a.role === "Professeur");
  const filteredPosts = filter === "Tous" ? posts : posts.filter(p => p.subject === filter);

  /* auto-scroll chat */
  useEffect(() => {
    if (view === "roomview" && chatEndRef.current) {
      chatEndRef.current.scrollIntoView({ behavior:"smooth" });
    }
  }, [selRoom, view]);

  /* sync selRoom with live rooms */
  useEffect(() => {
    if (selRoom) {
      const live = rooms.find(r => r.id === selRoom.id);
      if (live) setSelRoom(live);
    }
  }, [rooms]);

  /* ── helpers ── */
  function goBack() {
    setView(null); setSelPost(null); setSelProf(null); setSelRoom(null);
  }

  function pickImage(cb) {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = "image/*"; inp.multiple = true;
    inp.onchange = e => {
      Array.from(e.target.files).forEach(f => {
        const r = new FileReader();
        r.onload = ev => cb({ name:f.name, size:fmtB(f.size), dataUrl:ev.target.result });
        r.readAsDataURL(f);
      });
      e.target.value = "";
    };
    inp.click();
  }

  function pickDoc(cb) {
    const inp = document.createElement("input");
    inp.type = "file"; inp.multiple = true;
    inp.onchange = e => {
      Array.from(e.target.files).forEach(f => {
        const r = new FileReader();
        r.onload = ev => cb({ name:f.name, size:fmtB(f.size), dataUrl:ev.target.result });
        r.readAsDataURL(f);
      });
      e.target.value = "";
    };
    inp.click();
  }

  function dlFile(file) {
    if (!file?.dataUrl) { alert("Fichier de démonstration — pas de données."); return; }
    const a = document.createElement("a"); a.href = file.dataUrl; a.download = file.name; a.click();
  }

  /* ── publish ── */
  function handlePublish() {
    if (!pubTitle.trim()) return;
    const post = {
      id: Date.now(), authorId:user.id, authorName:user.name,
      subject:pubSubj, type:pubType, title:pubTitle.trim(),
      description:pubDesc, createdAt:"À l'instant", files:pubFiles,
    };
    setPosts(p => [post, ...p]);
    setPublished(true);
    setTimeout(() => {
      setPublished(false); setTab("feed");
      setPubTitle(""); setPubDesc(""); setPubFiles([]);
    }, 1600);
  }

  /* ── rating ── */
  function submitRating(tid) {
    const score = pendR[tid]; if (!score) return;
    setAccounts(a => {
      const acc = a[tid]; if (!acc) return a;
      return { ...a, [tid]: { ...acc, ratings:[...acc.ratings, score] } };
    });
    setDoneR(r => ({ ...r, [tid]:score }));
  }

  /* ── edit profile ── */
  function openEdit() {
    setEditName(user.name); setEditBio(user.bio||"");
    setEditSubj(user.subject); setEditColor(user.color||COLORS[3]);
    setEditSaved(false); setView("editprofile");
  }
  function saveEdit() {
    const u2 = { ...user, name:editName||user.name, bio:editBio, subject:editSubj, color:editColor };
    setUser(u2); setAccounts(a => ({ ...a, [u2.id]:u2 }));
    setEditSaved(true);
    setTimeout(() => { setView(null); setTab("profile"); setEditSaved(false); }, 1200);
  }
  function changeAvatar() {
    const inp = document.createElement("input"); inp.type="file"; inp.accept="image/*";
    inp.onchange = e => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = ev => {
        const u2 = { ...user, avatar:ev.target.result };
        setUser(u2); setAccounts(a => ({ ...a, [u2.id]:u2 }));
      };
      r.readAsDataURL(f);
    };
    inp.click();
  }

  /* ── create room ── */
  function handleCreateRoom() {
    if (!crName.trim()) return;
    const members = [user.id, ...(crTeach ? [crTeach] : [])];

      id:"r_"+Date.now(), name:crName.trim(), emoji:crEmoji||"💬",
      desc:crDesc, ownerId:user.id, members,
      maxMembers:Math.max(1,Math.min(10,crMax)), messages:[],

    setCrName(""); setCrEmoji("💬"); setCrDesc(""); setCrMax(5); setCrTeach("");
    setView(null); setTab("chat");

  function handleSend() {
    if (!chatMsg.trim() || !selRoom) return;
    const msg = { id:"m_"+Date.now(), authorId:user.id, authorName:user.name, text:chatMsg.trim(), time:nowT() };

    display:"flex", flexDirection:"column", minHeight:"92vh", position:"relative",

  /* ══ SPLASH ══ */

    <Wrap>
      <div style={phoneW}>
        <div style={{flex:1,display:"flex",flexDirection:"column",
          background:`linear-gradient(160deg,${C.red},${C.yellow})`}}>
          {/* hero */}
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",
            justifyContent:"center",flex:1,padding:"30px 28px 0"}}>
            <div style={{width:96,height:96,borderRadius:28,background:"rgba(255,255,255,.22)",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:48,marginBottom:24,boxShadow:"0 8px 32px rgba(0,0,0,.2)"}}>🎓</div>
            <div style={{fontFamily:"Georgia,serif",fontSize:42,fontWeight:900,color:"#fff",
              letterSpacing:"-1.5px",textAlign:"center",lineHeight:1.05,marginBottom:12}}>
              EduBoard
            </div>
            <div style={{color:"rgba(255,255,255,.8)",fontSize:15,marginBottom:40,
              textAlign:"center",lineHeight:1.65}}>
              Devoirs · Exercices · Discussions
            </div>
          </div>
          {/* white card bottom */}
          <div style={{background:C.white,borderRadius:"28px 28px 0 0",padding:"28px 28px 32px"}}>
            <Btn onClick={() => {}} style={{display:"none"}}/>
            {/* Setup wizard lives here */}
            <Setup onDone={acc => {
              setAccounts(a => ({ ...a, [acc.id]:acc }));
              setUser(acc); setTab("feed"); setView(null);
            }}/>
          </div>
        </div>
      </div>
    </Wrap>
  );

  /* ══ APP ══ */
  const liveRoom = selRoom ? rooms.find(r => r.id===selRoom.id)||selRoom : null;

  return (
    <Wrap>
      <div style={phoneW}>

        {/* ── TOP BAR ── */}
        <div style={{background:C.white,borderBottom:`1.5px solid ${C.border}`,

                  ].map(s=>(
                    <div key={s.l} style={{background:s.bg,borderRadius:16,padding:"14px 12px",textAlign:"center"}}>
                      <div style={{fontSize:20,fontWeight:900,color:s.c,fontFamily:"Georgia,serif"}}>{s.v}</div>
                      <div style={{fontSize:11,color:s.c,fontWeight:600,marginTop:2}}>{s.l}</div>
                    </div>
                  ))}
                </div>

                {/* rating */}
                {!isMe && (
                  <div style={{...card(),padding:20,marginBottom:14}}>
                    <div style={{fontWeight:800,color:C.ink,fontSize:15,marginBottom:12}}>
                      {done?"✅ Note envoyée !":"⭐ Noter ce professeur"}
                    </div>
                    {done ? (
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <StarRow val={done} size={20}/>
                        <span style={{color:C.muted,fontSize:13}}>Vous avez noté {done}/5</span>
                      </div>
                    ) : (
                      <>
                        <div style={{display:"flex",gap:8,marginBottom:14}}>
                          <StarRow val={pend} size={34}
                            onPick={n => setPendR(r=>({...r,[selProf.id]:n}))}/>
                        </div>
                        {pend > 0 && (
                          <Btn onClick={() => submitRating(selProf.id)}
                            style={{background:C.yellow,color:C.ink,borderRadius:12,
                              padding:"11px 22px",fontSize:13,fontWeight:800}}>
                            Envoyer ({pend}/5)
                          </Btn>
                        )}
                      </>
                    )}
                  </div>
                )}

                {/* prof's posts */}
                {pc > 0 && <>
                  <SecTitle>Publications ({pc})</SecTitle>
                  {posts.filter(p=>p.authorId===selProf.id).map((post,i)=>{
                    const pac=acOf(post.subject);
                    return (
                      <div key={post.id} onClick={()=>{setSelPost(post);setView("detail");}}
                        style={{...card(),padding:"14px 16px",marginBottom:10,cursor:"pointer",
                          animation:`fadeUp .3s ease ${i*.06}s both`}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                          <span style={pill(`${pac}18`,pac)}>{TYPE_ICO[post.type]||"📄"} {post.type}</span>
                          <span style={{color:C.muted,fontSize:11}}>{post.createdAt}</span>
                        </div>
                        <div style={{fontWeight:700,color:C.ink,fontSize:14}}>{post.title}</div>
                        <div style={{color:C.muted,fontSize:12,marginTop:4}}>
                          {post.description.slice(0,60)}…
                        </div>
                      </div>
                    );
                  })}
                </>}
              </div>
            );
          })()}

          {/* ════ EDIT PROFILE ════ */}
          {view==="editprofile" && (
            <div style={{animation:"pop .25s ease",display:"flex",flexDirection:"column",gap:14}}>
              {editSaved ? (
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",
                  justifyContent:"center",height:260,gap:16}}>
                  <div style={{width:72,height:72,borderRadius:"50%",background:C.greenL,
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:36}}>✅</div>
                  <div style={{fontFamily:"Georgia,serif",fontSize:20,fontWeight:900,color:C.ink}}>
                    Profil mis à jour !
                  </div>
                </div>
              ) : <>
                {/* avatar picker */}
                <div style={{...card(),padding:20,display:"flex",flexDirection:"column",
                  alignItems:"center",gap:12}}>
                  <div style={{position:"relative",cursor:"pointer"}} onClick={changeAvatar}>
                    <Avatar acc={user} size={84} fs={32}/>
                    <div style={{position:"absolute",bottom:2,right:2,width:28,height:28,
                      borderRadius:"50%",background:C.white,border:`1.5px solid ${C.border}`,
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>📷</div>
                  </div>
                  {user.avatar && (
                    <Btn onClick={()=>{const u2={...user,avatar:null};setUser(u2);setAccounts(a=>({...a,[u2.id]:u2}));}}
                      style={{background:"none",color:C.muted,fontSize:12,fontWeight:600}}>
                      Supprimer la photo
                    </Btn>
                  )}
                </div>

                {/* color */}
                <div>
                  <Label>Couleur d'avatar</Label>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                    {COLORS.map(col=>(
                      <div key={col} onClick={()=>setEditColor(col)}
                        style={{width:34,height:34,borderRadius:"50%",background:col,
                          cursor:"pointer",transition:"border .15s",
                          border:`3px solid ${editColor===col?C.ink:"transparent"}`}}/>
                    ))}
                  </div>
                </div>

                <div>
                  <Label>Nom affiché</Label>
                  <input value={editName} onChange={e=>setEditName(e.target.value)}
                    placeholder={user.name} style={inputS()}/>
                </div>

                <div>
                  <Label>Matière</Label>
                  <select value={editSubj} onChange={e=>setEditSubj(e.target.value)}
                    style={{width:"100%",background:C.bg,border:`1.5px solid ${C.border}`,
                      borderRadius:12,padding:"11px 10px",color:C.ink,fontSize:14,fontFamily:"inherit"}}>
                    {SUBJECTS.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>

                <div>
                  <Label>Bio</Label>
                  <textarea rows={4} value={editBio} onChange={e=>setEditBio(e.target.value)}
                    placeholder="Présentez-vous…"
                    style={{...inputS(),resize:"none",lineHeight:1.65}}/>
                </div>

                <Btn onClick={saveEdit}
                  style={{background:`linear-gradient(135deg,${C.green},${C.greenM})`,
                    color:"#fff",borderRadius:14,padding:15,fontSize:15,fontWeight:800,
                    boxShadow:"0 5px 20px rgba(24,201,100,.28)"}}>
                  💾 Enregistrer les modifications
                </Btn>
              </>}
            </div>
          )}

          {/* ════ MY PROFILE ════ */}
          {tab==="profile" && !view && (() => {
            const myPosts  = posts.filter(p=>p.authorId===user.id);
            const myRoomsN = rooms.filter(r=>r.members.includes(user.id)).length;
            return (
              <div>
                {/* header card */}
                <div style={{...card(),overflow:"hidden",marginBottom:14}}>
                  <div style={{height:80,background:`linear-gradient(135deg,${uc},${uc}77)`}}/>
                  <div style={{padding:"0 20px 20px",marginTop:-38}}>
                    <Avatar acc={user} size={76} fs={30}/>
                    <div style={{marginTop:10}}>
                      <div style={{fontFamily:"Georgia,serif",fontSize:22,fontWeight:900,color:C.ink}}>
                        {user.name}
                      </div>
                      <div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap"}}>
                        <span style={pill(`${uc}18`,uc)}>{user.role}</span>
                        <span style={pill(C.border,C.muted)}>{user.subject}</span>
                      </div>
                      <div style={{color:C.ink2,fontSize:13,lineHeight:1.65,marginTop:10}}>
                        {user.bio||"Aucune description."}
                      </div>
                    </div>
                  </div>
                </div>

                {/* actions */}
                <div style={{display:"flex",gap:10,marginBottom:14}}>
                  <Btn onClick={openEdit}
                    style={{flex:1,background:C.white,border:`1.5px solid ${C.border}`,
                      borderRadius:14,padding:12,fontSize:13,fontWeight:700,color:C.ink2}}>
                    ✏️ Modifier
                  </Btn>
                  <Btn onClick={() => { setUser(null); setTab("feed"); setView(null); }}
                    style={{flex:1,background:C.redL,border:`1.5px solid ${C.red}`,
                      borderRadius:14,padding:12,fontSize:13,fontWeight:700,color:C.red}}>
                    🚪 Quitter
                  </Btn>
                </div>

                {/* stats */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
                  {[
                    {l:"Publications",v:myPosts.length, bg:C.redL,   c:C.red},
                    {l:"Salons",      v:myRoomsN,        bg:C.blueL,  c:C.blue},
                    {l:"Rôle",        v:user.role==="Professeur"?"Prof":"Élève",bg:C.greenL,c:C.green},
                  ].map(s=>(
                    <div key={s.l} style={{background:s.bg,borderRadius:16,padding:"14px 8px",textAlign:"center"}}>
                      <div style={{fontSize:s.l==="Rôle"?13:22,fontWeight:900,color:s.c,
                        fontFamily:"Georgia,serif",wordBreak:"break-word"}}>{s.v}</div>
                      <div style={{fontSize:11,color:s.c,fontWeight:600,marginTop:2}}>{s.l}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

          {/* ════ CREATE POST ════ */}
          {tab==="create" && !view && canPublish && (
            <div>
              {published ? (
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",
                  justifyContent:"center",height:300,gap:16,animation:"pop .4s ease"}}>
                  <div style={{width:80,height:80,borderRadius:"50%",background:C.greenL,
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:40}}>✅</div>
                  <div style={{fontFamily:"Georgia,serif",fontSize:22,fontWeight:900,color:C.ink}}>
                    Publié !
                  </div>
                  <div style={{color:C.muted,fontSize:13}}>Les élèves peuvent maintenant le voir</div>
                </div>
              ) : (
                <div style={{animation:"fadeUp .3s ease",display:"flex",flexDirection:"column",gap:14}}>
                  <div style={{fontFamily:"Georgia,serif",fontSize:20,fontWeight:900,color:C.ink}}>
                    Nouvelle publication
                  </div>

                  {/* author tag */}
                  <div style={{...card({borderRadius:14}),padding:"12px 16px",
                    display:"flex",alignItems:"center",gap:10,
                    background:C.redL,border:`1.5px solid ${C.redM}33`}}>
                    <Avatar acc={user} size={36} fs={15}/>
                    <div>
                      <div style={{fontWeight:700,color:C.ink,fontSize:13}}>{user.name}</div>
                      <div style={{color:C.muted,fontSize:11}}>{user.subject} · {user.role}</div>
                    </div>
                  </div>

                  <div>
                    <Label>Titre *</Label>
                    <input value={pubTitle} onChange={e=>setPubTitle(e.target.value)}
                      placeholder="ex: Exercice sur les intégrales"
                      style={inputS(!pubTitle)}/>
                  </div>

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div>
                      <Label>Matière</Label>
                      <select value={pubSubj} onChange={e=>setPubSubj(e.target.value)}
                        style={{width:"100%",background:C.bg,border:`1.5px solid ${C.border}`,
                          borderRadius:12,padding:"11px 10px",color:C.ink,fontSize:13,fontFamily:"inherit"}}>
                        {SUBJECTS.map(s=><option key={s}>{s}</option>)}
                      </select>
                    </div>
                    <div>
                      <Label>Type</Label>
                      <select value={pubType} onChange={e=>setPubType(e.target.value)}
                        style={{width:"100%",background:C.bg,border:`1.5px solid ${C.border}`,
                          borderRadius:12,padding:"11px 10px",color:C.ink,fontSize:13,fontFamily:"inherit"}}>
                        {TYPES.map(t=><option key={t}>{t}</option>)}
                      </select>
                    </div>
                  </div>

                  <div>
                    <Label>Contenu / Énoncé</Label>
                    <textarea rows={5} value={pubDesc} onChange={e=>setPubDesc(e.target.value)}
                      placeholder="Énoncé de l'exercice, consignes…"
                      style={{...inputS(),resize:"none",lineHeight:1.65}}/>
                  </div>

                  {/* file attachments */}
                  <div>
                    <Label>📎 Pièces jointes</Label>
                    {pubFiles.length > 0 && (
                      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
                        {pubFiles.map((f,i)=>(
                          <div key={i} style={{background:C.bg,border:`1.5px solid ${C.border}`,
                            borderRadius:10,padding:"9px 12px",
                            display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <span style={{fontSize:16}}>{fileIco(f.name)}</span>
                              <div>
                                <div style={{color:C.ink,fontSize:12,fontWeight:600}}>{f.name}</div>
                                <div style={{color:C.muted,fontSize:11}}>{f.size}</div>
                              </div>
                            </div>
                            <Btn onClick={()=>setPubFiles(fs=>fs.filter((_,j)=>j!==i))}
                              style={{background:"none",color:C.muted,fontSize:15,padding:"2px 6px"}}>
                              ✕
                            </Btn>
                          </div>
                        ))}
                      </div>
                    )}
                    <div style={{display:"flex",gap:8}}>
                      <Btn onClick={()=>pickImage(f=>setPubFiles(fs=>[...fs,f]))}
                        style={{flex:1,background:C.yellowL,border:`2px dashed ${C.yellowM}`,
                          borderRadius:12,padding:10,fontSize:12,fontWeight:700,color:"#996900"}}>
                        🖼️ Photos
                      </Btn>
                      <Btn onClick={()=>pickDoc(f=>setPubFiles(fs=>[...fs,f]))}
                        style={{flex:1,background:C.greenL,border:`2px dashed ${C.greenM}`,
                          borderRadius:12,padding:10,fontSize:12,fontWeight:700,color:C.green}}>
                        📄 Documents
                      </Btn>
                    </div>
                  </div>

                  <Btn onClick={handlePublish} disabled={!pubTitle.trim()}
                    style={{marginTop:4,width:"100%",
                      background:`linear-gradient(135deg,${C.red},${C.redM})`,
                      color:"#fff",borderRadius:16,padding:16,fontSize:15,fontWeight:800,
                      boxShadow:"0 6px 24px rgba(232,40,74,.3)"}}>
                    📢 Publier maintenant
                  </Btn>
                </div>
              )}
            </div>
          )}
        </div>

        {/* ── BOTTOM NAV ── */}
        {!view && (
          <div style={{background:C.white,borderTop:`1.5px solid ${C.border}`,
            padding:"10px 6px 24px",display:"flex",justifyContent:"space-around",
            boxShadow:"0 -4px 20px rgba(26,26,46,.06)",flexShrink:0}}>
            {[
              {k:"feed",ic:"📚",lb:"Fil"},
              {k:"chat",ic:"💬",lb:"Salons"},
              {k:"teachers",ic:"👩‍🏫",lb:"Profs"},
              ...(canPublish ? [{k:"create",ic:"➕",lb:"Publier"}] : []),
              {k:"profile",ic:"👤",lb:"Profil"},
            ].map(item => {
              const on = tab===item.k;
              return (
                <div key={item.k} onClick={() => { setTab(item.k); setView(null); }}
                  style={{display:"flex",flexDirection:"column",alignItems:"center",
                    gap:3,cursor:"pointer"}}>
                  <div style={{width:40,height:40,borderRadius:14,
                    background:on?C.redL:"transparent",transition:"background .2s",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                    {item.ic}
                  </div>
                  <span style={{fontSize:10,color:on?C.red:C.muted,fontWeight:on?800:500}}>
                    {item.lb}
                  </span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </Wrap>
  );
}

/* ── Shell ── */
function Wrap({ children }) {
  return (
    <div style={{minHeight:"100vh",background:"#D8DBE6",display:"flex",
      justifyContent:"center",alignItems:"flex-start",
      fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif",
      padding:"16px 10px 30px"}}>
      <style>{`
        @keyframes fadeUp  { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
        @keyframes pop     { from{transform:scale(.92);opacity:0}        to{transform:scale(1);opacity:1} }
        @keyframes shake   { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
        @keyframes slideUp { from{transform:translateY(14px);opacity:0}  to{transform:translateY(0);opacity:1} }
        * { box-sizing:border-box; margin:0; padding:0; }
        ::-webkit-scrollbar { display:none; }
        input, textarea, select { outline:none; -webkit-appearance:none; }
        button { transition: opacity .15s, transform .15s; }
        button:not(:disabled):active { opacity:.8; transform:scale(.96); }
      `}</style>
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
